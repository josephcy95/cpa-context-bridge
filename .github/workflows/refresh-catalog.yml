name: Refresh catalog

# Re-bake the CLIProxyAPI + models.dev catalog snapshots and commit changes.
# Runs weekly and on demand. Keeps the baked fallback tracking upstream.

on:
  workflow_dispatch: {}
  schedule:
    # 04:17 UTC every Monday (off the :00 mark on purpose).
    - cron: '17 4 * * 1'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/refresh_catalog.py
      - name: Commit updated snapshots
        run: |
          if [ -n "$(git status --porcelain cpa_context_bridge/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add cpa_context_bridge/data
            git commit -m "chore: refresh catalog snapshots"
            git push
          else
            echo "No catalog changes."
          fi
